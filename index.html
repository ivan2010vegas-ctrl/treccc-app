<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TRECCC</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080810;
    --card: #0f0f1a;
    --card2: #141422;
    --border: rgba(255,255,255,0.06);
    --gold: #e8c547;
    --gold2: #f0d060;
    --gold-glow: rgba(232,197,71,0.15);
    --text: #eeeef5;
    --muted: #5a5a75;
    --green: #2ecc8a;
    --green-dim: rgba(46,204,138,0.08);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
    position: relative;
  }

  /* Ambient background */
  .ambient {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .ambient::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(232,197,71,0.06) 0%, transparent 70%);
    top: -200px; right: -200px;
    animation: drift 8s ease-in-out infinite alternate;
  }

  .ambient::after {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(80,60,200,0.05) 0%, transparent 70%);
    bottom: 100px; left: -100px;
    animation: drift 10s ease-in-out infinite alternate-reverse;
  }

  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(30px, 20px) scale(1.1); }
  }

  .page {
    position: relative; z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: 130px;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px;
    animation: fadeDown 0.5s ease both;
  }

  .logo {
    display: flex; align-items: center; gap: 10px;
  }

  .logo-mark {
    width: 34px; height: 34px;
    background: var(--gold);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 800; color: #000;
    letter-spacing: -0.03em;
  }

  .logo-name {
    font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--text);
  }

  .status-pill {
    display: flex; align-items: center; gap: 6px;
    background: var(--green-dim);
    border: 1px solid rgba(46,204,138,0.15);
    border-radius: 100px;
    padding: 5px 12px;
    font-size: 12px; font-weight: 500;
    color: var(--green);
  }

  .status-dot {
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── PRODUCT CARD ── */
  .product-card {
    margin: 4px 16px 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    overflow: hidden;
    animation: fadeUp 0.5s ease 0.08s both;
    position: relative;
  }

  .card-top-line {
    height: 1.5px;
    background: linear-gradient(90deg, transparent 0%, var(--gold) 50%, transparent 100%);
  }

  .card-body { padding: 22px 22px 20px; }

  .product-tag {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 14px;
  }

  .product-tag::before {
    content: '';
    width: 5px; height: 5px;
    background: var(--gold);
    border-radius: 50%;
    animation: blink 2s ease-in-out infinite;
  }

  .product-title {
    font-family: 'Syne', sans-serif;
    font-size: 26px; font-weight: 800;
    line-height: 1.15;
    letter-spacing: -0.03em;
    margin-bottom: 18px;
    background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.75) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .product-attrs {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .attr {
    display: flex; align-items: center; gap: 10px;
    font-size: 14px;
  }

  .attr-icon {
    width: 28px; height: 28px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0;
  }

  .attr-label { color: var(--muted); }
  .attr-value { color: var(--text); font-weight: 500; margin-left: auto; }

  /* ── PRICE BLOCK ── */
  .price-block {
    margin: 12px 16px 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    animation: fadeUp 0.5s ease 0.15s both;
  }

  .price-main-card {
    background: var(--gold);
    border-radius: 20px;
    padding: 18px 20px;
    display: flex; flex-direction: column;
    justify-content: space-between;
    min-height: 100px;
  }

  .price-main-label {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: rgba(0,0,0,0.5);
    margin-bottom: 6px;
  }

  .price-main-value {
    font-family: 'Syne', sans-serif;
    font-size: 32px; font-weight: 800;
    color: #000;
    line-height: 1;
    letter-spacing: -0.04em;
  }

  .price-main-currency {
    font-size: 14px; font-weight: 600;
    color: rgba(0,0,0,0.5);
    margin-top: 2px;
  }

  .price-conversions-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 6px;
  }

  .conv-row {
    display: flex; align-items: center; justify-content: space-between;
  }

  .conv-flag-label {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; color: var(--muted);
  }

  .conv-amount {
    font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 700;
    color: var(--text);
  }

  .conv-divider {
    height: 1px; background: var(--border);
  }

  /* ── FORM ── */
  .form-section {
    margin: 12px 16px 0;
    animation: fadeUp 0.5s ease 0.22s both;
  }

  .section-label {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    padding-left: 2px;
  }

  .fields { display: flex; flex-direction: column; gap: 8px; }

  .field {
    position: relative;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    display: flex; align-items: center;
    transition: border-color 0.2s;
    overflow: hidden;
  }

  .field:focus-within {
    border-color: rgba(232,197,71,0.4);
    background: var(--card2);
  }

  .field.error-field { border-color: rgba(255,80,80,0.5); }

  .field-icon {
    width: 48px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    padding-left: 4px;
  }

  .field input, .field textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    padding: 15px 16px 15px 0;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    -webkit-appearance: none;
  }

  .field textarea {
    height: 80px;
    resize: none;
    padding-top: 15px;
  }

  input::placeholder, textarea::placeholder { color: var(--muted); }

  .shake {
    animation: shake 0.4s ease;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  /* ── TRUST ROW ── */
  .trust-row {
    margin: 12px 16px 0;
    display: flex; gap: 8px;
    animation: fadeUp 0.5s ease 0.28s both;
  }

  .trust-item {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 14px;
    display: flex; align-items: center; gap: 8px;
  }

  .trust-icon { font-size: 18px; }

  .trust-text {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.35;
  }

  .trust-text strong { display: block; color: var(--text); font-size: 12px; margin-bottom: 1px; }

  /* ── BOTTOM BAR ── */
  .bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 12px 16px 28px;
    background: linear-gradient(to top, var(--bg) 60%, transparent);
    z-index: 100;
    animation: slideUp 0.5s ease 0.3s both;
  }

  .btn-submit {
    width: 100%;
    height: 58px;
    background: var(--gold);
    border: none;
    border-radius: 18px;
    font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 700;
    letter-spacing: 0.03em;
    color: #000;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 0 40px rgba(232,197,71,0.25);
  }

  .btn-submit::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
  }

  .btn-submit:active { transform: scale(0.97); box-shadow: 0 0 20px rgba(232,197,71,0.15); }
  .btn-submit:disabled { opacity: 0.5; pointer-events: none; }

  .btn-text { position: relative; z-index: 1; }

  /* Loading spinner inside button */
  .btn-spinner {
    display: none;
    width: 20px; height: 20px;
    border: 2px solid rgba(0,0,0,0.2);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
  }

  @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

  .btn-submit.loading .btn-text { visibility: hidden; }
  .btn-submit.loading .btn-spinner { display: block; }

  /* ── SUCCESS SCREEN ── */
  .success-screen {
    display: none;
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 200;
    align-items: center; justify-content: center;
    flex-direction: column;
    padding: 40px;
    text-align: center;
  }

  .success-screen.show {
    display: flex;
    animation: fadeIn 0.4s ease;
  }

  .success-ring {
    width: 90px; height: 90px;
    border: 2px solid var(--green);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 28px;
    position: relative;
    animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .success-ring::before {
    content: '';
    position: absolute; inset: 6px;
    background: var(--green-dim);
    border-radius: 50%;
  }

  .success-check {
    font-size: 36px;
    position: relative; z-index: 1;
  }

  .success-title {
    font-family: 'Syne', sans-serif;
    font-size: 26px; font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }

  .success-sub {
    font-size: 15px;
    color: var(--muted);
    line-height: 1.6;
    max-width: 260px;
  }

  .success-sub strong { color: var(--green); }

  /* ── ANIMATIONS ── */
  @keyframes fadeDown { from { opacity:0; transform:translateY(-12px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeUp   { from { opacity:0; transform:translateY(18px);  } to { opacity:1; transform:translateY(0); } }
  @keyframes slideUp  { from { opacity:0; transform:translateY(24px);  } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeIn   { from { opacity:0; } to { opacity:1; } }
  @keyframes popIn    { from { opacity:0; transform:scale(0.4); } to { opacity:1; transform:scale(1); } }
</style>
</head>
<body>

<div class="ambient"></div>

<div class="page">

  <div class="header">
    <div class="logo">
      <div class="logo-mark">TR</div>
      <div class="logo-name">TRECCC</div>
    </div>
    <div class="status-pill">
      <div class="status-dot"></div>
      В продаже
    </div>
  </div>

  <div class="product-card">
    <div class="card-top-line"></div>
    <div class="card-body">
      <div class="product-tag">Товар</div>
      <div class="product-title" id="productName">Загрузка...</div>
      <div class="product-attrs">
        <div class="attr">
          <div class="attr-icon">📍</div>
          <span class="attr-label">Локация</span>
          <span class="attr-value" id="productCountry">—</span>
        </div>
        <div class="attr">
          <div class="attr-icon">🚛</div>
          <span class="attr-label">Доставка</span>
          <span class="attr-value" id="productDelivery">—</span>
        </div>
      </div>
    </div>
  </div>

  <div class="price-block">
    <div class="price-main-card">
      <div class="price-main-label">Цена</div>
      <div>
        <div class="price-main-value" id="priceUSDT">—</div>
        <div class="price-main-currency">USDT</div>
      </div>
    </div>
    <div class="price-conversions-card">
      <div class="conv-row">
        <div class="conv-flag-label">🇷🇺 RUB</div>
        <div class="conv-amount" id="priceRUB">—</div>
      </div>
      <div class="conv-divider"></div>
      <div class="conv-row">
        <div class="conv-flag-label">🇰🇿 KZT</div>
        <div class="conv-amount" id="priceKZT">—</div>
      </div>
      <div class="conv-divider"></div>
      <div class="conv-row">
        <div class="conv-flag-label">🇧🇾 BYN</div>
        <div class="conv-amount" id="priceBYN">—</div>
      </div>
    </div>
  </div>

  <div class="form-section">
    <div class="section-label">Ваши данные</div>
    <div class="fields">
      <div class="field" id="fieldName">
        <div class="field-icon">👤</div>
        <input type="text" id="inputName" placeholder="Ваше имя" maxlength="60" autocomplete="name" />
      </div>
      <div class="field" id="fieldPhone">
        <div class="field-icon">📱</div>
        <input type="tel" id="inputPhone" placeholder="Номер телефона" maxlength="25" autocomplete="tel" />
      </div>
      <div class="field">
        <div class="field-icon">✈️</div>
        <input type="text" id="inputTg" placeholder="@username в Telegram (опционально)" maxlength="50" />
      </div>
      <div class="field">
        <div class="field-icon" style="align-self:flex-start;padding-top:15px;">💬</div>
        <textarea id="inputComment" placeholder="Комментарий к заказу (опционально)"></textarea>
      </div>
    </div>
  </div>

  <div class="trust-row">
    <div class="trust-item">
      <div class="trust-icon">🛡️</div>
      <div class="trust-text"><strong>Безопасно</strong>Данные только продавцу</div>
    </div>
    <div class="trust-item">
      <div class="trust-icon">⚡️</div>
      <div class="trust-text"><strong>Быстро</strong>Ответ в течение часа</div>
    </div>
    <div class="trust-item">
      <div class="trust-icon">🤝</div>
      <div class="trust-text"><strong>Честно</strong>Прямая сделка</div>
    </div>
  </div>

</div>

<!-- Кнопка -->
<div class="bottom-bar">
  <button class="btn-submit" id="btnSubmit" onclick="submitOrder()">
    <span class="btn-text">🛒 &nbsp;ОТПРАВИТЬ ЗАЯВКУ</span>
    <div class="btn-spinner"></div>
  </button>
</div>

<!-- Экран успеха -->
<div class="success-screen" id="successScreen">
  <div class="success-ring">
    <div class="success-check">✓</div>
  </div>
  <div class="success-title">Заявка принята!</div>
  <div class="success-sub">Продавец получил ваши данные.<br><strong>Скоро свяжется с вами</strong> в Telegram.</div>
</div>

<script>
  // Инициализация Telegram WebApp
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.expand();
    tg.setHeaderColor('#080810');
    tg.setBackgroundColor('#080810');
  }

  // ⬇️ ЗАМЕНИ НА СВОЙ ТОКЕН БОТА
  const BOT_TOKEN = "8569255666:AAG9tD6eN-5H0pibnktu8eJ5eg8kNfFKHVc";

  const rates = { RUB: 92.5, KZT: 455.0, BYN: 3.25 };

  // Читаем параметры из URL
  const p = new URLSearchParams(window.location.search);
  const sellerId    = p.get('seller_id') || '';
  const productName = p.get('name')      || 'Товар';
  const price       = parseInt(p.get('price')) || 0;
  const country     = p.get('country')   || '—';
  const delivery    = p.get('delivery')  || '—';

  // Заполняем карточку
  document.getElementById('productName').textContent    = productName.toUpperCase();
  document.getElementById('productCountry').textContent = country;
  document.getElementById('productDelivery').textContent= delivery;
  document.getElementById('priceUSDT').textContent      = price;
  document.getElementById('priceRUB').textContent       = Math.round(price * rates.RUB).toLocaleString('ru') + ' ₽';
  document.getElementById('priceKZT').textContent       = Math.round(price * rates.KZT).toLocaleString('ru') + ' ₸';
  document.getElementById('priceBYN').textContent       = (price * rates.BYN).toFixed(1) + ' Br';

  // Автозаполнение имени из Telegram
  if (tg?.initDataUnsafe?.user) {
    const u = tg.initDataUnsafe.user;
    const fullName = [u.first_name, u.last_name].filter(Boolean).join(' ');
    if (fullName) document.getElementById('inputName').value = fullName;
    if (u.username) document.getElementById('inputTg').value = '@' + u.username;
  }

  function shakeField(id) {
    const el = document.getElementById(id);
    el.classList.add('error-field', 'shake');
    setTimeout(() => el.classList.remove('shake'), 400);
  }

  async function submitOrder() {
    const name    = document.getElementById('inputName').value.trim();
    const phone   = document.getElementById('inputPhone').value.trim();
    const tgUser  = document.getElementById('inputTg').value.trim();
    const comment = document.getElementById('inputComment').value.trim();

    let ok = true;
    if (!name)  { shakeField('fieldName');  ok = false; }
    else document.getElementById('fieldName').classList.remove('error-field');
    if (!phone) { shakeField('fieldPhone'); ok = false; }
    else document.getElementById('fieldPhone').classList.remove('error-field');
    if (!ok) return;

    const btn = document.getElementById('btnSubmit');
    btn.classList.add('loading');
    btn.disabled = true;

    // Формируем красивое сообщение для бота
    const msg =
      `🔔 *НОВАЯ ЗАЯВКА НА ПОКУПКУ*\n\n` +
      `📦 Товар: *${productName.toUpperCase()}*\n` +
      `💰 Цена: *${price} USDT*\n` +
      `───────────────\n` +
      `👤 Имя: ${name}\n` +
      `📱 Телефон: ${phone}\n` +
      `✈️ Telegram: ${tgUser || '—'}\n` +
      (comment ? `💬 Комментарий: ${comment}\n` : '') +
      `───────────────\n` +
      `🆔 ID продавца: ${sellerId}`;

    try {
      // Шлём сообщение продавцу напрямую через Bot API
      const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          chat_id: sellerId,
          text: msg,
          parse_mode: 'Markdown'
        })
      });

      const data = await res.json();

      if (data.ok) {
        document.getElementById('successScreen').classList.add('show');
        // Закрываем WebApp через 2.5 сек если открыт внутри TG
        if (tg) setTimeout(() => tg.close(), 2500);
      } else {
        throw new Error(data.description);
      }

    } catch(e) {
      btn.classList.remove('loading');
      btn.disabled = false;
      alert('Ошибка отправки. Попробуй ещё раз.\n' + e.message);
    }
  }
</script>

</body>
</html>
